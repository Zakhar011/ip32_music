<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify</title>
    <link rel="stylesheet" href="{% static "styles.css" %}" />
</head>
<body>
    <div id="wrapper">
	<div id="header">
		<div id="menu">
	<a href="/">Главная</a>
	<a href="/janri/" >Жанры музыки</a>
    <a href="/Tracks/">Треки</a>
</div>
	</div>
	<div id="container">
		
		<div id="content">
			<table>
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Название</th>
                        <th>Длительность</th>
                        <th>Жанры</th>
                        <th></th>
                        <th></th>
                        </tr>
                        </thead>
            <tbody>
                {% for t in Tracks %}
                <tr>
                    <td>{{t.id}}</td>
                    <td>{{t.title}}</td>
                    <td>{{t.duration}}</td>
                
                    <td>
                        {% for g in t.genres.all %}
                            {{g.name_en}},
                            {% endfor %}
                    <td><a href="/edite/{{t.id}}">Редактировать</a></td>
                    <td><a href="/delete_track/{{t.id}}">Удалить</a></td>    
                </tr>
                {% endfor %}    
            </tbody>       
            </table> 
            <a href="/add_track/">Добавить жанр</a>  
		</div>
	</div>
	<div id="footer">
		footer
	</div>
</div>
</body>
</html>
